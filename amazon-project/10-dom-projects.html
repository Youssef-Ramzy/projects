<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DOM Projects</title>
  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
    }
    .subscribe-button {
       border: none;
       border-radius: 50px;
       padding: 10px 15px;
       color: white;
       background-color: black;
       font-weight: bold; 
       cursor: pointer;
       margin-bottom: 30px;
    }
    .is-subscribed {
      background-color: rgb(240, 240, 240);
      color: black;
    }
    .cost-input {
      margin-bottom: 10px;
      font-size: 15px;
      padding: 10px;
    }
    .calculate-button {
      padding: 12px 15px;
      background-color: green;
      color: white;
      border: none;
      cursor: pointer;
      font-size: 15px;
    }
  </style>
</head>

<body>
  <p>YouTube Subscribe Button</p>
  <button onclick="onSubscribe()" class="js-subscribe-button subscribe-button">Subscribe</button>

  <p>Amazon Shipping Calculator</p>
  <input class="js-cost-input cost-input" placeholder="Cost of order" onkeydown="handleCostKeyDown(event)">
  <button onclick="calculateTotal()" class="calculate-button">Calculate</button>
  <p class="js-total-cost"></p>
  <script>
    function handleCostKeyDown(event) {
      if (event.key === 'Enter') {
        calculateTotal();
      }
    }

    function calculateTotal() {
      const inputElement = document.querySelector('.js-cost-input');
      let cost = Number(inputElement.value);
      if (cost < 40) {
        cost += 10;
      }
      if (cost === 0) {
        document.querySelector('.js-total-cost').innerText = `Please enter a cost`;
      } else {
        document.querySelector('.js-total-cost').innerText = `Total cost: $${cost}`;
      }
    }
    function onSubscribe() {
      const buttonElement = document.querySelector('.js-subscribe-button');
      if (buttonElement.innerText === 'Subscribe') {
        buttonElement.innerText = 'Subscribed';
        buttonElement.classList.add('is-subscribed');
      } else {
        buttonElement.innerText = 'Subscribe';
        buttonElement.classList.remove('is-subscribed');
      }
    }
    window.console.log('window')
  </script>
</body>

</html>
