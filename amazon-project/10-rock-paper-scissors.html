<!DOCTYPE html>
<html>

<head>
  <title>Rock Paper Scissors</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: rgb(25, 25, 25);
      color: white;
    }
    .title {
      font-size: 30px;
      font-weight: bold; 
    }
    .move-icon {
      width: 50px;
      height: 50px;
      cursor: pointer;
    }
    .move-button {
      background-color: transparent;
      border: 3px solid white;
      border-radius: 50%;
      width: 120px;
      height: 120px;
      margin: 10px;
    }
    .result {
      font-size: 25px;
      font-weight: bold;
      margin-top: 30px;
    }
    .score {
      margin-top: 60px;
    }
    .reset-score-button {
      margin-top: 10px;
      padding: 8px 15px;
      background-color: white;
      border: none;
      font-size: 15px;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <p class="title">Rock Paper Scissors</p>
  <button class="move-button" onclick="
      playGame('rock');
    "><img src="images/rock-emoji.png" class="move-icon"></button>

  <button class="move-button" onclick="
      playGame('paper');
    "><img src="images/paper-emoji.png" class="move-icon"></button>

  <button class="move-button" onclick="
      playGame('scissors');
    "><img src="images/scissors-emoji.png" class="move-icon"></button>

  <p class="js-result result"></p>
  <p class="js-moves moves"></p>
  <p class="js-score score"></p>

  <button class="reset-score-button" onclick="
        resetGame();
      ">Reset Score</button>

  <script>
    const score = JSON.parse(localStorage.getItem('score')) || { wins: 0, losses: 0, ties: 0 };

    document.querySelector('.js-score').innerHTML = `Score: ${score.wins}-${score.losses}-${score.ties}`;

    function playGame(playerMove) {
      const computerMove = pickComputerMove();

      let result = '';
      if (playerMove === computerMove) {
        result = 'Tie.';
      } else if (playerMove === 'rock' && computerMove === 'scissors') {
        result = 'You win.';
      } else if (playerMove === 'paper' && computerMove === 'rock') {
        result = 'You win.';
      } else if (playerMove === 'scissors' && computerMove === 'paper') {
        result = 'You win.';
      } else {
        result = 'You lose.';
      }

      if (result === 'You win.') {
        score.wins += 1;
      } else if (result === 'You lose.') {
        score.losses += 1;
      } else {
        score.ties += 1;
      }
      localStorage.setItem('score', JSON.stringify(score));
      updateScore();

      document.querySelector('.js-result').innerHTML = result;
      document.querySelector('.js-moves').innerHTML = `You
    <img src="images/${playerMove}-emoji.png" class="move-icon">
    <img src="images/${computerMove}-emoji.png" class="move-icon">
    Computer`;
    }

    function updateScore() {
      document.querySelector('.js-score').innerHTML = `Score: ${score.wins}-${score.losses}-${score.ties}`;
    }

    function pickComputerMove() {
      const randomNumber = Math.floor(Math.random() * 3) + 1;

      let computerMove = '';
      if (randomNumber === 1) {
        computerMove = 'rock';
      } else if (randomNumber === 2) {
        computerMove = 'paper';
      } else if (randomNumber === 3) {
        computerMove = 'scissors';
      }
      return computerMove;
    }

    function resetGame() {
      score.wins = 0;
      score.losses = 0;
      score.ties = 0;
      localStorage.removeItem('score');
      updateScore();
    }
  </script>
</body>

</html>
