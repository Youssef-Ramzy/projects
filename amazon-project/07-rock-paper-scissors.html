<!DOCTYPE html>
<html>

<head>
  <title>Rock Paper Scissors</title>
</head>

<body>
  <p>Rock Paper Scissors</p>
  <button onclick="
      alert(playGame('rock'));
    ">Rock</button>

  <button onclick="
      alert(playGame('paper'));
    ">Paper</button>

  <button onclick="
      alert(playGame('scissors'));
    ">Scissors</button>

  <script>
    function playGame(playerMove) {
      const computerMove = pickComputerMove();

      let result = '';
      if (playerMove === computerMove) {
        result = 'Tie.';
      } else if (playerMove === 'rock' && computerMove === 'scissors') {
        result = 'You win.';
      } else if (playerMove === 'paper' && computerMove === 'rock') {
        result = 'You win.';
      } else if (playerMove === 'scissors' && computerMove === 'paper') {
        result = 'You win.';
      } else {
        result = 'You lose.';
      }

      return `You picked ${playerMove}. Computer picked ${computerMove}. ${result}`;
    }

    function pickComputerMove() {
      const randomNumber = Math.floor((Math.random() * (3 - 1) + 1));

      let computerMove = '';
      if (randomNumber === 1) {
        computerMove = 'rock';
      } else if (randomNumber === 2) {
        computerMove = 'paper';
      } else if (randomNumber === 3) {
        computerMove = 'scissors';
      }
      return computerMove;
    }
  </script>
</body>

</html>
