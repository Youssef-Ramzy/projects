<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <input type="text" class="js-name-input" onkeydown='onEnter(event)'>
  <button type="button" onclick="onNameSubmit()">Submit</button>
  <p class="js-result"></p>
  <script>
    function onNameSubmit() {
      const name = document.querySelector('.js-name-input').value;
      document.querySelector('.js-result').innerText = `Your name is ${name}`;
    }
    function onEnter(event) {
      if(event.key === 'Enter') {
        onNameSubmit();
      }
    }
  </script>
</body>
</html>
